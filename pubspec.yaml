name: aigc_five_men_team
description: BlueCare elderly companion app scaffold.
publish_to: "none"

version: 0.2.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.9.0
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.3
  sqflite_common_ffi: ^2.4.0+3
  sqflite_common_ffi_web: ^1.1.1
  speech_to_text: ^7.3.0
  file_selector: ^1.1.0
  record: ^6.2.0
  path_provider: ^2.1.5
  audioplayers: ^6.4.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Windows 官方插件 JSON 与 speech_to_text 解析器不兼容（缺 alternates），见 packages/speech_to_text_windows。
dependency_overrides:
  speech_to_text_windows:
    path: packages/speech_to_text_windows

flutter:
  uses-material-design: true

hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3
      name: sqlite3
